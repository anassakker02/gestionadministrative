<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Proxy Vite</title>
</head>
<body>
    <h1>Test du Proxy Vite</h1>
    <button onclick="testHealth()">Test Health Check</button>
    <button onclick="testLogin()">Test Login</button>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');
        
        function log(message) {
            results.innerHTML += '<div>' + message + '</div>';
            console.log(message);
        }

        async function testHealth() {
            log('🔍 Test Health Check...');
            try {
                const response = await fetch('/gestionadminastration/us-central1/api/v1/health');
                const data = await response.json();
                log('✅ Health Check réussi: ' + JSON.stringify(data));
            } catch (error) {
                log('❌ Health Check échoué: ' + error.message);
            }
        }

        async function testLogin() {
            log('🔐 Test Login...');
            try {
                const response = await fetch('/gestionadminastration/us-central1/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@gmail.com',
                        password: 'password123'
                    })
                });
                const data = await response.json();
                log('✅ Login réussi: ' + JSON.stringify(data));
            } catch (error) {
                log('❌ Login échoué: ' + error.message);
            }
        }
    </script>
</body>
</html>
