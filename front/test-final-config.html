<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Configuration Finale</title>
</head>
<body>
    <h1>Test Configuration Finale</h1>
    <button onclick="testConfig()">Test Configuration</button>
    <button onclick="testRegister()">Test Register</button>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');
        
        function log(message) {
            results.innerHTML += '<div>' + message + '</div>';
            console.log(message);
        }

        async function testConfig() {
            log('🔍 Test de la configuration...');
            
            // Test 1: Health Check
            log('1️⃣ Test Health Check...');
            try {
                const response = await fetch('/gestionadminastration/us-central1/api/v1/health');
                const data = await response.json();
                log('✅ Health Check réussi: ' + JSON.stringify(data));
            } catch (error) {
                log('❌ Health Check échoué: ' + error.message);
            }
            
            // Test 2: Login
            log('2️⃣ Test Login...');
            try {
                const response = await fetch('/gestionadminastration/us-central1/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@gmail.com',
                        password: 'password123'
                    })
                });
                const data = await response.json();
                log('✅ Login réussi: ' + JSON.stringify(data));
            } catch (error) {
                log('❌ Login échoué: ' + error.message);
            }
        }

        async function testRegister() {
            log('🔐 Test Register...');
            try {
                const response = await fetch('/gestionadminastration/us-central1/api/v1/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'password123',
                        nom: 'Test',
                        prenom: 'User'
                    })
                });
                const data = await response.json();
                log('✅ Register réussi: ' + JSON.stringify(data));
            } catch (error) {
                log('❌ Register échoué: ' + error.message);
            }
        }
    </script>
</body>
</html>
